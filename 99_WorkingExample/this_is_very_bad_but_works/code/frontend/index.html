<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recipe Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <h1>AI Recipe Manager</h1>
        <div id="auth">
            <h2>Register</h2>
            <form id="register-form">
                <input type="text" placeholder="Username" id="register-username" required>
                <input type="password" placeholder="Password" id="register-password" required>
                <button type="submit">Register</button>
            </form>

            <h2>Login</h2>
            <form id="login-form">
                <input type="text" placeholder="Username" id="login-username" required>
                <input type="password" placeholder="Password" id="login-password" required>
                <button type="submit">Login</button>
            </form>
        </div>

        <div id="dashboard" style="display:none;">
            <h2>Agent Input</h2>
            <form id="agent-form">
                <textarea id="agent-input" placeholder="Enter AI response here..."></textarea>
                <button type="submit">Submit</button>
            </form>

            <button id="fetch-recipes">Fetch Recipes</button>

            <h2>Your Recipes</h2>
            <div id="recipes"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
