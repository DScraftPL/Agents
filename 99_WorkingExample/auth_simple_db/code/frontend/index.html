<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Recipe App</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .chat-container { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Welcome to Chat Recipe App</h1>
    <div id="auth">
        <h2>Register</h2>
        <input type="text" id="register-username" placeholder="Username">
        <input type="password" id="register-password" placeholder="Password">
        <button onclick="register()">Register</button>

        <h2>Login</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div class="chat-container" style="display:none;" id="chat">
        <h2>Chat with AI</h2>
        <textarea id="chat-message" placeholder="Write your recipe prompt..."></textarea>
        <button onclick="sendMessage()">Send</button>
        <div id="chat-response"></div>
    </div>

    <script>
        function register() {
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            fetch('http://localhost:5000/register', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
            });
        }

        function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            fetch('http://localhost:5000/login', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.message === 'Login successful') {
                    document.getElementById('chat').style.display = 'block';
                    document.getElementById('auth').style.display = 'none';
                }
                alert(data.message);
            });
        }

        function sendMessage() {
            const message = document.getElementById('chat-message').value;
            fetch('http://localhost:5000/chat', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('chat-response').innerText = data.content;
                alert(data.message);
            });
        }
    </script>
</body>
</html>
