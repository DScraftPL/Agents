<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recipe Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div id="forms">
            <form id="register-form">
                <h2>Register</h2>
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>

            <form id="login-form">
                <h2>Login</h2>
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>

        <div id="dashboard" style="display: none;">
            <h2>Recipe Dashboard</h2>
            <form id="recipe-form">
                <input type="text" id="recipe-title" placeholder="Recipe Title" required>
                <textarea id="recipe-content" placeholder="Recipe Content" required></textarea>
                <button type="submit">Save Recipe</button>
            </form>
            <div id="recipes-list"></div>
            
            <h3>Agent Code Input</h3>
            <form id="agent-form">
                <input type="text" id="agent-code" placeholder="Enter Agent Code" required>
                <button type="submit">Submit Code</button>
            </form>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
