<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penguin Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: none; /* Hide content initially */
        }
        #map {
            width: 100%;
            height: 100vh;
            z-index: 1;
        }
        #penguinList {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-height: 90vh;
            overflow-y: auto;
            z-index: 1000;
        }
    </style>
    <script>
      $(document).ready(function() {
          const auth = localStorage.getItem('auth');
          if (!auth) {
              window.location.href = 'login.html';
          } else {
              $('body').show();
              var map = L.map('map').setView([0, 0], 2);
              L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                  maxZoom: 19,
              }).addTo(map);

              $.ajax({
                  url: 'http://localhost:5000/api/penguins',
                  method: 'GET',
                  headers: {
                      'Authorization': auth
                  },
                  success: function(data) {
                      var $penguinList = $('#penguinCoords');
                      $.each(data, function(key, penguin) {
                          var marker = L.marker(penguin.location).addTo(map);
                          marker.bindPopup('<b>' + key + '</b>').openPopup();

                          $penguinList.append('<li>' + key + ': Latitude ' + penguin.location[0] + ', Longitude ' + penguin.location[1] + '</li>');
                      });
                  },
                  error: function() {
                      localStorage.removeItem('auth');
                      window.location.href = 'login.html';
                  }
              });
          }
      });
    </script>
</head>
<body>
    <div id="map"></div>
    <div id="penguinList">
        <h2>Penguin Coordinates</h2>
        <ul id="penguinCoords">
        </ul>
    </div>
</body>
</html>
