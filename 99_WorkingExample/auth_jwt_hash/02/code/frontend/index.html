<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Culinary Chat Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to the Culinary Chat Application</h1>
    <div id="user-container">
        <h2>Register</h2>
        <input type="text" id="register-username" placeholder="Username">
        <input type="password" id="register-password" placeholder="Password">
        <button onclick="register()">Register</button>

        <h2>Login</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

        <div id="recipe-image" style="display:none; float:left;">
            <img src="http://127.0.0.1:5000/static/images/recipe.png" alt="recipe" style="width:300px; height:auto; margin-right:20px;">
        </div>

    <div id="chat-container" style="display:none;">
        <h2>Chat with Culinary Agent</h2>

        <div id="chat-box">
            <!-- Chat messages will go here -->
        </div>
        <input type="text" id="user-input" placeholder="Type your message">
        <button onclick="sendMessage()">Send</button>
        <div id="throbber">Loading...</div>
    </div>

    <div id="recipe-sidebar">
        <!-- User's recipes will be displayed here -->
    </div>

    <script src="scripts.js"></script>
</body>
</html>
